<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg"
     font-family="'Cascadia Code','Consolas',Menlo,Monaco,monospace">

  <rect width="1200" height="260" rx="16" fill="#06090f"/>

  <rect x="5" y="5" width="1190" height="250" rx="14"
        fill="none" stroke="#ffd700" stroke-width="1.4" opacity="0.7">
    <animate attributeName="opacity"
             values="0.7;0.95;0.7"
             dur="5s"
             repeatCount="indefinite"/>
  </rect>


  <!-- CHAOTIC IT RAIN -->
  <text x="40" y="-120" fill="#00ff9a" font-size="10" opacity="0.45">0x7FFE12A0
    <animate attributeName="y" from="-120" to="300" dur="4.8s" repeatCount="indefinite"/>
  </text>

  <text x="80" y="-200" fill="#00ff9a" font-size="10" opacity="0.55">DE AD BE EF
    <animate attributeName="y" from="-200" to="300" dur="7.1s" repeatCount="indefinite"/>
  </text>

  <text x="120" y="-90" fill="#00ff9a" font-size="10" opacity="0.35">:443
    <animate attributeName="y" from="-90" to="300" dur="5.0s" repeatCount="indefinite"/>
  </text>

  <text x="160" y="-240" fill="#00ff9a" font-size="10" opacity="0.50">A9F3
    <animate attributeName="y" from="-240" to="300" dur="8.0s" repeatCount="indefinite"/>
  </text>

  <text x="200" y="-70" fill="#00ff9a" font-size="10" opacity="0.30">0101
    <animate attributeName="y" from="-70" to="300" dur="4.6s" repeatCount="indefinite"/>
  </text>

  <text x="240" y="-260" fill="#00ff9a" font-size="10" opacity="0.55">0xA0B1
    <animate attributeName="y" from="-260" to="300" dur="8.4s" repeatCount="indefinite"/>
  </text>

  <text x="280" y="-140" fill="#00ff9a" font-size="10" opacity="0.45">987
    <animate attributeName="y" from="-140" to="300" dur="6.3s" repeatCount="indefinite"/>
  </text>

  <text x="320" y="-300" fill="#00ff9a" font-size="10" opacity="0.55">0xFF12
    <animate attributeName="y" from="-300" to="300" dur="8.7s" repeatCount="indefinite"/>
  </text>

  <text x="360" y="-110" fill="#00ff9a" font-size="10" opacity="0.40">:8080
    <animate attributeName="y" from="-110" to="300" dur="5.4s" repeatCount="indefinite"/>
  </text>

  <text x="400" y="-320" fill="#00ff9a" font-size="10" opacity="0.55">D4C1
    <animate attributeName="y" from="-320" to="300" dur="9.0s" repeatCount="indefinite"/>
  </text>


  <text x="50%" y="32%" text-anchor="middle" font-size="40" font-weight="700"
        fill="#00ffd0">
    &gt; MF-swiss Engineering Studio
    <animate attributeName="opacity"
             values="1;0.7;1"
             dur="4s"
             repeatCount="indefinite"/>
  </text>

  <text x="50%" y="50%" text-anchor="middle" font-size="16"
        fill="#9fe8d4">
    Full-Stack Engineering · Java Backend · React Frontend · Cloud &amp; Containerization
  </text>


  <text x="1200" y="220" font-size="13" fill="#87a9bd">
    Java · Spring Boot · REST-APIs · React · Vite · PostgreSQL · Docker · Git · UI/UX-Design · Software-Architektur · Containerisierung · Debugging · API-Integration ·
    <animate attributeName="x"
             from="1200" to="-1800"
             dur="20s"
             repeatCount="indefinite"/>
  </text>

</svg>
