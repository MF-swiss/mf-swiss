<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg"
     font-family="'Cascadia Code','Consolas',Menlo,Monaco,monospace">

  <!-- Background -->
  <rect width="1200" height="340" rx="18" fill="#06090f"/>

  <!-- Static Glow -->
  <rect width="1200" height="340" rx="18" fill="#ffd700" opacity="0.12"/>

  <!-- Pulsing Border -->
  <rect x="5" y="5" width="1190" height="330" rx="16"
        fill="none" stroke="#ffd700" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity"
             values="0.55;0.9;0.55"
             dur="5s"
             repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="50%" y="32%" text-anchor="middle" font-size="54" font-weight="700"
        fill="#00ffd0">
    &gt;_ MF-swiss
    <animate attributeName="opacity"
             values="1;0.7;1"
             dur="4s"
             repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="50%" y="46%" text-anchor="middle" font-size="18"
        fill="#9fe8d4">
    Full‑Stack Engineering · Java Backend · React Frontend · Cloud & Containerization
  </text>

  <!-- Skill Ticker -->
  <text x="1200" y="300" font-size="16" fill="#6c8a9b">
    Java · Spring Boot · REST‑APIs · React · Vite · PostgreSQL · Docker · Git · UI/UX‑Design · Software‑Architektur · Containerisierung · Debugging · API‑Integration ·
    <animate attributeName="x"
             from="1200" to="-1800"
             dur="18s"
             repeatCount="indefinite"/>
  </text>

  <!-- MATRIX CODE RAIN (GitHub‑safe) -->
  <!-- Only ASCII characters, only animate y -->

  <!-- Column 1 -->
  <text x="120" y="-20" fill="#00ff9a" font-size="14">01
    <animate attributeName="y" from="-20" to="360" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Column 2 -->
  <text x="180" y="-20" fill="#00ff9a" font-size="14">0xA
    <animate attributeName="y" from="-20" to="360" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Column 3 -->
  <text x="240" y="-20" fill="#00ff9a" font-size="14">11
    <animate attributeName="y" from="-20" to="360" dur="5.5s" repeatCount="indefinite"/>
  </text>

  <!-- Column 4 -->
  <text x="300" y="-20" fill="#00ff9a" font-size="14">0xF
    <animate attributeName="y" from="-20" to="360" dur="6.5s" repeatCount="indefinite"/>
  </text>

  <!-- Column 5 -->
  <text x="360" y="-20" fill="#00ff9a" font-size="14">10
    <animate attributeName="y" from="-20" to="360" dur="7.5s" repeatCount="indefinite"/>
  </text>

  <!-- Column 6 -->
  <text x="420" y="-20" fill="#00ff9a" font-size="14">0x3
    <animate attributeName="y" from="-20" to="360" dur="5.8s" repeatCount="indefinite"/>
  </text>

  <!-- Column 7 -->
  <text x="480" y="-20" fill="#00ff9a" font-size="14">01
    <animate attributeName="y" from="-20" to="360" dur="6.2s" repeatCount="indefinite"/>
  </text>

  <!-- Column 8 -->
  <text x="540" y="-20" fill="#00ff9a" font-size="14">0xC
    <animate attributeName="y" from="-20" to="360" dur="7.2s" repeatCount="indefinite"/>
  </text>

  <!-- Column 9 -->
  <text x="600" y="-20" fill="#00ff9a" font-size="14">11
    <animate attributeName="y" from="-20" to="360" dur="6.8s" repeatCount="indefinite"/>
  </text>

  <!-- Column 10 -->
  <text x="660" y="-20" fill="#00ff9a" font-size="14">0x7
    <animate attributeName="y" from="-20" to="360" dur="5.9s" repeatCount="indefinite"/>
  </text>

  <!-- Column 11 -->
  <text x="720" y="-20" fill="#00ff9a" font-size="14">01
    <animate attributeName="y" from="-20" to="360" dur="7.1s" repeatCount="indefinite"/>
  </text>

  <!-- Column 12 -->
  <text x="780" y="-20" fill="#00ff9a" font-size="14">0xE
    <animate attributeName="y" from="-20" to="360" dur="6.4s" repeatCount="indefinite"/>
  </text>

  <!-- Column 13 -->
  <text x="840" y="-20" fill="#00ff9a" font-size="14">10
    <animate attributeName="y" from="-20" to="360" dur="7.4s" repeatCount="indefinite"/>
  </text>

  <!-- Column 14 -->
  <text x="900" y="-20" fill="#00ff9a" font-size="14">0xB
    <animate attributeName="y" from="-20" to="360" dur="5.7s" repeatCount="indefinite"/>
  </text>

  <!-- Column 15 -->
  <text x="960" y="-20" fill="#00ff9a" font-size="14">11
    <animate attributeName="y" from="-20" to="360" dur="6.3s" repeatCount="indefinite"/>
  </text>

  <!-- Column 16 -->
  <text x="1020" y="-20" fill="#00ff9a" font-size="14">0x9
    <animate attributeName="y" from="-20" to="360" dur="7.3s" repeatCount="indefinite"/>
  </text>

</svg>
