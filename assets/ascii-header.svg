<svg width="1200" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code','Consolas',Menlo,Monaco,monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffc8"/>
      <stop offset="55%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#0f1b2a" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="150" rx="12" fill="url(#bgGrad)"/>
  <rect width="1200" height="150" rx="12" fill="url(#grid)" opacity="0.55"/>
  <rect width="1200" height="150" rx="12" fill="url(#glow)"/>
  <rect x="3" y="3" width="1194" height="144" rx="10" fill="none" stroke="url(#titleGrad)" stroke-width="1.2" opacity="0.5"/>

  <text x="50%" y="45%" text-anchor="middle" font-size="32" font-weight="700"
        fill="url(#titleGrad)" filter="url(#softGlow)" letter-spacing="1">
    &gt;_ mf-swiss
  </text>

  <text x="50%" y="66%" text-anchor="middle" font-size="14" fill="#8fe3c7" letter-spacing="0.5">
    Full-Stack Developer
  </text>

  <text x="50%" y="84%" text-anchor="middle" font-size="12" fill="#5f7a8c" letter-spacing="0.5">
    Java · Spring Boot · React · Vite · PostgreSQL · Docker
  </text>
</svg>