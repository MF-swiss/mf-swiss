<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, Menlo, Monaco, monospace">

  <!-- Fenster -->
  <rect x="0" y="0" width="900" height="260" rx="10" fill="#050810"/>
  <rect x="2" y="2" width="896" height="256" rx="9" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.35"/>

  <!-- Titlebar -->
  <rect x="0" y="0" width="900" height="34" rx="10" fill="#0b1018"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="17" r="6" fill="#27c93f"/>
  <text x="450" y="22" text-anchor="middle" font-size="13" fill="#7d8590">mf-swiss — zsh</text>

  <!-- Boot-Zeilen: nacheinander einblenden, dann Loop -->
  <text x="24" y="70" font-size="15" fill="#00ff88" opacity="0">
    $ sudo init --mf-swiss --premium --neon
    <animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.02;0.9;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <text x="24" y="98" font-size="15" fill="#00ff88" opacity="0">
    [BOOT] core modules ......... loading
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.08;0.12;0.9;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <text x="24" y="122" font-size="15" fill="#00ff88" opacity="0">
    [BOOT] frontend engine (React/Vite)
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.18;0.22;0.9;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <text x="24" y="146" font-size="15" fill="#00ff88" opacity="0">
    [BOOT] UI/UX layer ready
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.28;0.32;0.9;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Fortschrittsbalken -->
  <rect x="24" y="180" width="852" height="18" rx="4" fill="#101722" stroke="#1c2733"/>
  <rect x="24" y="180" width="0" height="18" rx="4" fill="url(#barGrad)">
    <animate attributeName="width" values="0;0;852;852" keyTimes="0;0.05;0.85;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>

  <!-- Statuszeile -->
  <text x="24" y="222" font-size="14" fill="#00ff88" opacity="0">
    STATUS: <tspan fill="#ffd700">ONLINE</tspan> — mf-swiss :: High Informatiker
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.85;0.9;0.98;1" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Blinkender Cursor -->
  <rect x="24" y="236" width="10" height="16" fill="#00ff88">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>