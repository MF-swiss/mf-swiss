    <clipPath id="c1"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;120;120;0" keyTimes="0;0.025;0.067;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c2"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;420;420;0" keyTimes="0;0.083;0.167;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c3"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;190;190;0" keyTimes="0;0.2;0.242;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c4"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;560;560;0" keyTimes="0;0.267;0.367;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c5"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;340;340;0" keyTimes="0;0.383;0.45;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c6"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;480;480;0" keyTimes="0;0.467;0.55;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c7"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;110;110;0" keyTimes="0;0.583;0.617;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c8"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" values="0;0;140;140;0" keyTimes="0;0.633;0.667;0.9;1" dur="12s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <rect x="0" y="0" width="900" height="360" rx="12" fill="#050810"/>
  <rect x="2" y="2" width="896" height="356" rx="11" fill="none" stroke="url(#barGrad)" stroke-width="1" opacity="0.35"/>

  <rect x="0" y="0" width="900" height="36" rx="12" fill="#0b1018"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="18" r="6" fill="#27c93f"/>
  <text x="450" y="23" text-anchor="middle" font-size="13" fill="#7d8590">mf-swiss — full-stack developer</text>

  <g font-size="17">
    <g transform="translate(24,72)" clip-path="url(#c1)"><text fill="#00ffc8">$ whoami</text></g>
    <g transform="translate(24,102)" clip-path="url(#c2)"><text fill="#e8e8e8">&gt; mf-swiss — Full-Stack Developer</text></g>

    <g transform="translate(24,144)" clip-path="url(#c3)"><text fill="#00ffc8">$ stack --list</text></g>
    <g transform="translate(24,174)" clip-path="url(#c4)"><text fill="#e8e8e8">&gt; Backend:  Java · Spring Boot · REST · PostgreSQL</text></g>
    <g transform="translate(24,202)" clip-path="url(#c5)"><text fill="#e8e8e8">&gt; Frontend: React · Vite · CSS</text></g>
    <g transform="translate(24,230)" clip-path="url(#c6)"><text fill="#e8e8e8">&gt; Tools:    Docker · Git · Linux · Windows Terminal</text></g>

    <g transform="translate(24,272)" clip-path="url(#c7)"><text fill="#00ffc8">$ status</text></g>
    <g transform="translate(24,302)" clip-path="url(#c8)"><text fill="#ffd700" font-weight="700">&gt; ONLINE</text></g>
